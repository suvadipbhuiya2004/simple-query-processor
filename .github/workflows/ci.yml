name: C++ CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      # Installs CMake and standard C++ build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Build Project
      # Calls the 'build' target from your Makefile
      run: make build BUILD_TYPE=Release

    - name: Run Tests
      # Calls 'test-verbose' so you get full failure logs in the CI console
      run: make test-verbose